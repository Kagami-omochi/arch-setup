#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprlock
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = swww-daemon
exec-once = blueman-applet
exec-once = fcitx5
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator
exec-once = hyprctl setcursor BreezeX-Dark 28

exec-once = ~/.config/hypr/scripts/update-notify.sh
exec-once = mkdir -p /run/user/1000/cliphist && wl-paste --type text --watch cliphist -db-path /run/user/1000/cliphist/db store
exec-once = wl-paste --type image --watch cliphist -db-path /run/user/1000/cliphist/db store
exec-once = sleep 3 && sunshine
exec-once = hyprpanel
exec-once = obs --startminimised --startreplaybuffer
exec-once = discord --start-minimized
exec-once = steam -silent
exec-once = ~/.config/hypr/scripts/random_wall.sh
